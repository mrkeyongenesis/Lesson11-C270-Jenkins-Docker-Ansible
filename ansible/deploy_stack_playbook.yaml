---
# ============================================================
#  Deploy the two-tier app: FastAPI back-end + Streamlit front-end.
#  Pulls both images from Docker Hub and wires them together.
#
#  Run with:
#    ansible-playbook deploy_stack_playbook.yaml -e target=staging
#    ansible-playbook deploy_stack_playbook.yaml -e target=production
#
#  ⚠️ EDIT the two image names below to your Docker Hub username,
#     OR pass them on the command line, e.g.:
#       -e dh_user=yourname
# ============================================================
- name: DEPLOY FASTAPI BACK-END + STREAMLIT FRONT-END STACK
  hosts: "{{ target | default('staging') }}"
  gather_facts: false

  vars:
    # Choose between local images and Docker Hub images.
    dh_user: "{{ dh_user | default('') }}"
    local_mode: "{{ dh_user == '' }}"
    backend_image: "{{ local_mode | ternary('student-backend:latest', dh_user ~ '/student-backend:latest') }}"
    frontend_image: "{{ local_mode | ternary('student-frontend:latest', dh_user ~ '/student-frontend:latest') }}"
    image_source: "{{ local_mode | ternary('local', 'pull') }}"
    backend_name: "backend-{{ target }}"
    frontend_name: "frontend-{{ target }}"
    appnet_name: "appnet-{{ target }}"
    api_port: "{{ (target == 'staging') | ternary(8001, 8002) }}"
    ui_port: "{{ (target == 'staging') | ternary(8501, 8502) }}"

  tasks:
    - name: REMOVE OLD BACKEND CONTAINER IF IT EXISTS
      community.docker.docker_container:
        name: "{{ backend_name }}"
        state: absent
      ignore_errors: true

    - name: REMOVE OLD FRONTEND CONTAINER IF IT EXISTS
      community.docker.docker_container:
        name: "{{ frontend_name }}"
        state: absent
      ignore_errors: true

    - name: CREATE A PRIVATE NETWORK FOR THE STACK
      community.docker.docker_network:
        name: "{{ appnet_name }}"
        state: present

    # ---------- BACK-END (FastAPI) ----------
    - name: PULL THE BACK-END IMAGE
      community.docker.docker_image:
        name: "{{ backend_image }}"
        source: "{{ image_source }}"
        force_source: "{{ (image_source == 'pull') | ternary(true, omit) }}"

    - name: RUN THE FASTAPI BACK-END CONTAINER
      community.docker.docker_container:
        name: "{{ backend_name }}"
        image: "{{ backend_image }}"
        state: started
        recreate: true
        networks:
          - name: "{{ appnet_name }}"
        published_ports:
          - "{{ api_port }}:8000"           # mapped out to api_port

    # ---------- FRONT-END (Streamlit) ----------
    - name: PULL THE FRONT-END IMAGE
      community.docker.docker_image:
        name: "{{ frontend_image }}"
        source: "{{ image_source }}"
        force_source: "{{ (image_source == 'pull') | ternary(true, omit) }}"

    - name: RUN THE STREAMLIT FRONT-END CONTAINER
      community.docker.docker_container:
        name: "{{ frontend_name }}"
        image: "{{ frontend_image }}"
        state: started
        recreate: true
        networks:
          - name: "{{ appnet_name }}"
        published_ports:
          - "{{ ui_port }}:8501"           # mapped out to ui_port
        env:
          # The front-end reaches the back-end by container name over appnet.
          API_URL: "http://{{ backend_name }}:8000"

    - name: GATHER BACKEND CONTAINER INFORMATION
      community.docker.docker_container_info:
        name: "{{ backend_name }}"
      register: backend_info

    - name: GATHER FRONTEND CONTAINER INFORMATION
      community.docker.docker_container_info:
        name: "{{ frontend_name }}"
      register: frontend_info

    - name: SET INTERNAL SERVICE IP FACTS
      ansible.builtin.set_fact:
        backend_ip: "{{ backend_info.containers[0].NetworkSettings.Networks[appnet_name].IPAddress }}"
        frontend_ip: "{{ frontend_info.containers[0].NetworkSettings.Networks[appnet_name].IPAddress }}"

    - name: SHOW BACKEND AND FRONTEND INTERNAL IP ADDRESSES
      ansible.builtin.debug:
        msg:
          - "Backend internal IP: {{ backend_ip }}"
          - "Frontend internal IP: {{ frontend_ip }}"

    # ---------- HEALTH CHECKS (run from the Codespace) ----------
    - name: WAIT FOR THE BACK-END API TO RESPOND
      ansible.builtin.uri:
        url: "http://{{ backend_ip }}:8000/"
        return_content: yes
      register: api_result
      retries: 15
      delay: 2
      until: api_result.status == 200
      delegate_to: localhost
      ignore_errors: true

    - name: WAIT FOR THE FRONT-END UI TO RESPOND
      ansible.builtin.uri:
        url: "http://localhost:{{ ui_port }}/"
        status_code: 200
      register: ui_result
      retries: 15
      delay: 2
      until: ui_result.status == 200
      delegate_to: localhost
      ignore_errors: true

    - name: SHOW WHAT THE API RETURNED
      ansible.builtin.debug:
        msg: "API says: {{ api_result.content }}"
      when: api_result.status is defined and api_result.status == 200
      delegate_to: localhost

    - name: DEPLOYMENT SUMMARY
      ansible.builtin.debug:
        msg: "✅ Deployment complete. Backend on port {{ api_port }}, Frontend on port {{ ui_port }}"
      delegate_to: localhost
