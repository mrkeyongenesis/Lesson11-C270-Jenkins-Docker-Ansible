# ============================================================
#  SonarQube project configuration
#  Analyzes both backend (Python/FastAPI) and frontend (Python/Streamlit)
# ============================================================

# Unique project key on the SonarQube server
sonar.projectKey=student-app
sonar.projectName=Student App (FastAPI + Streamlit)
sonar.projectVersion=1.0

# Paths to source directories (relative to project root)
sonar.sources=backend,frontend

# Exclude test directories / venvs / node_modules etc.
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/*.pyc

# Python-specific settings
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8

# Where to publish the report (relative to build dir)
sonar.python.coverage.reportPaths=coverage.xml
